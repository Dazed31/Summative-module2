<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    
    <button id="theme-toggle">Toggle Theme</button>

    
    <form id="search-term">
        <input type="text" id="word-input" placeholder="Search a word...">
        <button type="submit">Search</button>
    </form>

   
    <div id="loading" class="hidden">Loading...</div>

   
    <div class="card" id="result"></div>

  
    <div class="top-row">

      
        <div class="card">
            <h3>Saved Words</h3>
            <ul id="saved-words"></ul>
        </div>

       
        <div class="card" id="synonyms-section">
            <h3>Synonyms</h3>
            <p id="synonyms"></p>
        </div>

       
        <div class="card">
            <h3>Word of the Day</h3>
            <p id="wotd-word"></p>
            <p id="wotd-def"></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
